<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #161616;
      --muted: #666;
      --border: #e5e7eb;
      --accent: #7966fa;
      --accent-soft: #eeeaff;
      --danger: #e84d5b;
      --warn: #ffb020;
      --ok: #1fbf6c;
      --shadow: 0 12px 35px rgba(0,0,0,0.08);
    }

    body.dark {
      --bg: #111217;
      --card: #1b1d25;
      --text: #f4f4f5;
      --muted: #aaa;
      --border: #303340;
      --accent-soft: #28234d;
      --shadow: 0 12px 35px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px;
    }

    .topbar, .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .card, .note {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    p {
      color: var(--muted);
    }

    input, textarea, select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: var(--card);
      color: var(--text);
      margin-top: 10px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      border: none;
      padding: 11px 16px;
      border-radius: 13px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 12px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary { background: var(--accent); color: white; }
    .danger { background: var(--danger); color: white; }
    .warn { background: var(--warn); color: white; }
    .gray { background: #777; color: white; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 120px;
      gap: 12px;
    }

    .notes {
      display: grid;
      gap: 14px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 26px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: var(--card);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      margin-top: 18px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 1000;
      min-width: 240px;
    }

    .toast.ok { border-left: 5px solid var(--ok); }
    .toast.error { border-left: 5px solid var(--danger); }
    .toast.info { border-left: 5px solid var(--accent); }

    mark {
      background: #fff1a8;
      color: #111;
      padding: 1px 3px;
      border-radius: 4px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .grid, .filters {
        grid-template-columns: 1fr;
      }

      .topbar, .section-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">
      <div>
        <h1>Notes App</h1>
        <p id="userText">Login to manage your private notes.</p>
      </div>

      <div>
        <button class="gray" onclick="toggleTheme()">Dark Mode</button>
        <button id="logoutBtn" class="danger hidden" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- AUTH SECTION -->
    <div id="authSection" class="card">
      <h2 id="authTitle">Login</h2>

      <input id="name" placeholder="Name" class="hidden" />
      <input id="email" placeholder="Email" type="email" />
      <input id="password" placeholder="Password" type="password" />

      <button id="authBtn" class="primary" onclick="handleAuth()">Login</button>

      <p>
        <span id="authSwitchText">Don't have an account?</span>
        <button class="gray" onclick="toggleAuthMode()">Switch</button>
      </p>
    </div>

    <!-- APP SECTION -->
    <div id="appSection" class="hidden">

      <div class="card">
        <div class="grid">
          <input id="title" placeholder="Enter note title" />
          <input id="quickTag" placeholder="Optional tag/category" />
        </div>

        <textarea id="content" placeholder="Enter note content"></textarea>

        <button id="saveBtn" class="primary" onclick="saveNote()">Save Note</button>

        <button id="cancelBtn" class="gray hidden" onclick="cancelEdit()">Cancel Edit</button>
      </div>

      <div class="card">
        <div class="filters">
          <input id="searchInput" placeholder="Search title or content..." />
          <input id="startDate" type="date" />
          <input id="endDate" type="date" />

          <select id="limitSelect">
            <option value="5">5 / page</option>
            <option value="10">10 / page</option>
            <option value="20">20 / page</option>
          </select>
        </div>
      </div>

      <div class="section-head">
        <h2>All Notes</h2>
        <div id="countText">Loading...</div>
      </div>

      <div id="notes" class="notes"></div>

      <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
      </div>

    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    let isSignup = false;
    let editingId = null;
    let currentPage = 1;
    let totalPages = 1;
    let debounceTimer = null;

    const token = () => localStorage.getItem("notes_token");
    const user = () => JSON.parse(localStorage.getItem("notes_user") || "null");

    const authSection = document.getElementById("authSection");
    const appSection = document.getElementById("appSection");
    const logoutBtn = document.getElementById("logoutBtn");
    const userText = document.getElementById("userText");

    const authTitle = document.getElementById("authTitle");
    const authBtn = document.getElementById("authBtn");
    const authSwitchText = document.getElementById("authSwitchText");

    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const titleInput = document.getElementById("title");
    const contentInput = document.getElementById("content");
    const quickTagInput = document.getElementById("quickTag");
    const notesDiv = document.getElementById("notes");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    const searchInput = document.getElementById("searchInput");
    const startDateInput = document.getElementById("startDate");
    const endDateInput = document.getElementById("endDate");
    const limitSelect = document.getElementById("limitSelect");

    const countText = document.getElementById("countText");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const toast = document.getElementById("toast");

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token()}`
      };
    }

    function toggleAuthMode() {
      isSignup = !isSignup;

      authTitle.innerText = isSignup ? "Signup" : "Login";
      authBtn.innerText = isSignup ? "Signup" : "Login";
      authSwitchText.innerText = isSignup ? "Already have an account?" : "Don't have an account?";

      nameInput.classList.toggle("hidden", !isSignup);
    }

    async function handleAuth() {
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (isSignup && !name) {
        showToast("Name is required", "error");
        return;
      }

      if (!email || !password) {
        showToast("Email and password are required", "error");
        return;
      }

      const url = isSignup ? "/api/auth/signup" : "/api/auth/login";
      const body = isSignup ? { name, email, password } : { email, password };

      authBtn.disabled = true;
      authBtn.innerText = isSignup ? "Signing up..." : "Logging in...";

      try {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const result = await response.json();

        if (!result.success) {
          showToast(result.message || "Authentication failed", "error");
          return;
        }

        localStorage.setItem("notes_token", result.token);
        localStorage.setItem("notes_user", JSON.stringify(result.user));

        showToast(result.message, "ok");
        showApp();
      } catch (error) {
        showToast("Authentication failed", "error");
      } finally {
        authBtn.disabled = false;
        authBtn.innerText = isSignup ? "Signup" : "Login";
      }
    }

    function showApp() {
      const savedUser = user();

      authSection.classList.add("hidden");
      appSection.classList.remove("hidden");
      logoutBtn.classList.remove("hidden");

      userText.innerText = savedUser ? `Logged in as ${savedUser.name}` : "Logged in";

      fetchNotes();
    }

    function showAuth() {
      authSection.classList.remove("hidden");
      appSection.classList.add("hidden");
      logoutBtn.classList.add("hidden");
      userText.innerText = "Login to manage your private notes.";
    }

    function logout() {
      localStorage.removeItem("notes_token");
      localStorage.removeItem("notes_user");
      resetForm();
      showAuth();
      showToast("Logged out", "info");
    }

    async function saveNote() {
      const title = titleInput.value.trim();
      let content = contentInput.value.trim();

      if (quickTagInput.value.trim()) {
        content = `[${quickTagInput.value.trim()}] ${content}`;
      }

      if (!title || !content) {
        showToast("Please fill title and content", "error");
        return;
      }

      const url = editingId ? `/api/notes/${editingId}` : "/api/notes";
      const method = editingId ? "PUT" : "POST";

      saveBtn.disabled = true;
      saveBtn.innerText = editingId ? "Updating..." : "Saving...";

      try {
        const response = await fetch(url, {
          method,
          headers: authHeaders(),
          body: JSON.stringify({ title, content })
        });

        const result = await response.json();

        if (response.status === 401) {
          logout();
          showToast("Session expired. Login again.", "error");
          return;
        }

        if (result.success) {
          showToast(result.message, "ok");
          resetForm();
          fetchNotes();
        } else {
          showToast(result.message || "Action failed", "error");
        }
      } catch (error) {
        showToast("Something went wrong", "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = editingId ? "Update Note" : "Save Note";
      }
    }

    async function fetchNotes() {
      notesDiv.innerHTML = `<div class="empty">Loading notes...</div>`;
      countText.innerText = "Loading...";

      const params = new URLSearchParams({
        page: currentPage,
        limit: limitSelect.value
      });

      if (searchInput.value.trim()) params.append("search", searchInput.value.trim());
      if (startDateInput.value) params.append("startDate", startDateInput.value);
      if (endDateInput.value) params.append("endDate", endDateInput.value);

      try {
        const response = await fetch(`/api/notes?${params.toString()}`, {
          headers: authHeaders()
        });

        const result = await response.json();

        if (response.status === 401) {
          logout();
          showToast("Session expired. Login again.", "error");
          return;
        }

        notesDiv.innerHTML = "";

        totalPages = result.totalPages || 1;
        countText.innerText = `${result.totalNotes || 0} note(s) found`;
        pageInfo.innerText = `Page ${result.currentPage || 1} of ${totalPages}`;

        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        if (!result.data || result.data.length === 0) {
          notesDiv.innerHTML = `<div class="empty">No notes found</div>`;
          return;
        }

        const search = searchInput.value.trim();

        result.data.forEach(note => {
          const safeTitle = escapeHtml(note.title);
          const safeContent = escapeHtml(note.content);

          notesDiv.innerHTML += `
            <div class="note">
              <h3>${highlightText(safeTitle, search)}</h3>
              <p>${highlightText(safeContent, search)}</p>
              <small>Created: ${formatDate(note.createdAt)}</small>

              <button class="warn" onclick="editNote('${note._id}', \`${escapeForTemplate(note.title)}\`, \`${escapeForTemplate(note.content)}\`)">
                Edit
              </button>

              <button class="danger" onclick="deleteNote('${note._id}')">
                Delete
              </button>
            </div>
          `;
        });
      } catch (error) {
        notesDiv.innerHTML = `<div class="empty">Failed to load notes</div>`;
        showToast("Failed to load notes", "error");
      }
    }

    function editNote(id, title, content) {
      editingId = id;
      titleInput.value = title;
      contentInput.value = content;
      quickTagInput.value = "";
      saveBtn.innerText = "Update Note";
      cancelBtn.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
      showToast("Editing note", "info");
    }

    function cancelEdit() {
      resetForm();
      showToast("Edit cancelled", "info");
    }

    async function deleteNote(id) {
      if (!confirm("Are you sure you want to delete this note?")) return;

      try {
        const response = await fetch(`/api/notes/${id}`, {
          method: "DELETE",
          headers: authHeaders()
        });

        const result = await response.json();

        if (response.status === 401) {
          logout();
          showToast("Session expired. Login again.", "error");
          return;
        }

        if (result.success) {
          showToast(result.message, "ok");
          fetchNotes();
        } else {
          showToast(result.message || "Delete failed", "error");
        }
      } catch (error) {
        showToast("Delete failed", "error");
      }
    }

    function changePage(direction) {
      const nextPage = currentPage + direction;
      if (nextPage < 1 || nextPage > totalPages) return;
      currentPage = nextPage;
      fetchNotes();
    }

    function resetForm() {
      editingId = null;
      titleInput.value = "";
      contentInput.value = "";
      quickTagInput.value = "";
      saveBtn.innerText = "Save Note";
      cancelBtn.classList.add("hidden");
    }

    function showToast(text, type = "info") {
      toast.className = `toast ${type}`;
      toast.innerText = text;
      toast.style.display = "block";

      setTimeout(() => {
        toast.style.display = "none";
      }, 2200);
    }

    function highlightText(text, keyword) {
      if (!keyword) return text;
      const regex = new RegExp(`(${escapeRegExp(keyword)})`, "gi");
      return text.replace(regex, "<mark>$1</mark>");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeForTemplate(text) {
      return String(text)
        .replaceAll("\\", "\\\\")
        .replaceAll("`", "\\`")
        .replaceAll("${", "\\${");
    }

    function escapeRegExp(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function formatDate(date) {
      if (!date) return "Unknown";
      return new Date(date).toLocaleString();
    }

    function toggleTheme() {
      document.body.classList.toggle("dark");
      localStorage.setItem("notes_theme", document.body.classList.contains("dark") ? "dark" : "light");
    }

    function loadTheme() {
      if (localStorage.getItem("notes_theme") === "dark") {
        document.body.classList.add("dark");
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        currentPage = 1;
        fetchNotes();
      }, 450);
    });

    startDateInput.addEventListener("change", () => {
      currentPage = 1;
      fetchNotes();
    });

    endDateInput.addEventListener("change", () => {
      currentPage = 1;
      fetchNotes();
    });

    limitSelect.addEventListener("change", () => {
      currentPage = 1;
      fetchNotes();
    });

    loadTheme();

    if (token()) {
      showApp();
    } else {
      showAuth();
    }
  </script>

</body>
</html>
