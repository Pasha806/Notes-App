<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>
</head>
<body>

  <h1>Notes App</h1>

  <input id="title" placeholder="Title" />
  <br><br>

  <textarea id="content" placeholder="Content"></textarea>
  <br><br>

  <button onclick="addNote()">Save Note</button>

  <p id="message"></p>

  <h2>All Notes</h2>
  <div id="notes"></div>

  <script>
    let editingId = null;

    async function addNote() {
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();

      if (!title || !content) {
        document.getElementById("message").innerText = "Please fill all fields";
        return;
      }

      const url = editingId ? `/api/notes/${editingId}` : "/api/notes";
      const method = editingId ? "PUT" : "POST";

      try {
        const response = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title, content })
        });

        const result = await response.json();

        document.getElementById("message").innerText = result.message;

        document.getElementById("title").value = "";
        document.getElementById("content").value = "";

        editingId = null;

        fetchNotes();
      } catch (error) {
        document.getElementById("message").innerText = "Something went wrong";
      }
    }

    async function fetchNotes() {
      try {
        const response = await fetch("/api/notes");
        const result = await response.json();

        const notesDiv = document.getElementById("notes");
        notesDiv.innerHTML = "";

        result.data.forEach(note => {
          notesDiv.innerHTML += `
            <div>
              <h3>${note.title}</h3>
              <p>${note.content}</p>

              <button onclick="editNote('${note._id}', \`${note.title}\`, \`${note.content}\`)">
                Edit
              </button>

              <button onclick="deleteNote('${note._id}')">
                Delete
              </button>

              <hr>
            </div>
          `;
        });
      } catch (error) {
        document.getElementById("message").innerText = "Failed to load notes";
      }
    }

    function editNote(id, title, content) {
      editingId = id;

      document.getElementById("title").value = title;
      document.getElementById("content").value = content;

      document.getElementById("message").innerText = "Editing note...";
    }

    async function deleteNote(id) {
      try {
        const response = await fetch(`/api/notes/${id}`, {
          method: "DELETE"
        });

        const result = await response.json();

        document.getElementById("message").innerText = result.message;

        fetchNotes();
      } catch (error) {
        document.getElementById("message").innerText = "Delete failed";
      }
    }

    fetchNotes();
  </script>

</body>
</html>
