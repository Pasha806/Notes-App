<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6fb;
      color: #222;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #6c63ff;
    }

    button {
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 12px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .save-btn {
      background: #6c63ff;
      color: white;
    }

    .cancel-btn {
      background: #777;
      color: white;
      margin-left: 8px;
    }

    .edit-btn {
      background: #ffb020;
      color: white;
      margin-right: 8px;
    }

    .delete-btn {
      background: #e84d5b;
      color: white;
    }

    #message {
      font-weight: bold;
      margin-top: 14px;
      color: #6c63ff;
    }

    .note {
      background: white;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .note h3 {
      margin: 0 0 8px;
    }

    .note p {
      margin: 0 0 12px;
      color: #555;
    }

    .empty {
      color: #777;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>Notes App</h1>

      <input id="title" placeholder="Enter note title" />

      <textarea id="content" placeholder="Enter note content"></textarea>

      <button id="saveBtn" class="save-btn" onclick="saveNote()">Save Note</button>

      <button id="cancelBtn" class="cancel-btn" onclick="cancelEdit()" style="display: none;">
        Cancel Edit
      </button>

      <p id="message"></p>
    </div>

    <input
     id="searchInput"
    placeholder="Search notes..."
    oninput="fetchNotes()"
    />

    <h2>All Notes</h2>
    <div id="notes"></div>

  </div>

  <script>
    let editingId = null;

    const titleInput = document.getElementById("title");
    const contentInput = document.getElementById("content");
    const message = document.getElementById("message");
    const notesDiv = document.getElementById("notes");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const searchInput = document.getElementById("searchInput");

    async function saveNote() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title || !content) {
        showMessage("Please fill all fields");
        return;
      }

      const url = editingId ? `/api/notes/${editingId}` : "/api/notes";
      const method = editingId ? "PUT" : "POST";

      saveBtn.disabled = true;
      saveBtn.innerText = editingId ? "Updating..." : "Saving...";

      try {
        const response = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title, content })
        });

        const result = await response.json();

        showMessage(result.message);

        if (result.success) {
          resetForm();
          fetchNotes();
        }
      } catch (error) {
        showMessage("Something went wrong");
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = editingId ? "Update Note" : "Save Note";
      }
    }

    async function fetchNotes() {
      notesDiv.innerHTML = `<div class="empty">Loading notes...</div>`;

      try {
        const search = searchInput.value.trim();
        const response = await fetch(`/api/notes?search=${encodeURIComponent(search)}`);
        const result = await response.json();

        notesDiv.innerHTML = "";

        if (!result.data || result.data.length === 0) {
          notesDiv.innerHTML = `<div class="empty">No notes found</div>`;
          return;
        }

        result.data.forEach(note => {
          notesDiv.innerHTML += `
            <div class="note">
              <h3>${escapeHtml(note.title)}</h3>
              <p>${escapeHtml(note.content)}</p>

              <button class="edit-btn" onclick="editNote('${note._id}', \`${escapeForTemplate(note.title)}\`, \`${escapeForTemplate(note.content)}\`)">
                Edit
              </button>

              <button class="delete-btn" onclick="deleteNote('${note._id}')">
                Delete
              </button>
            </div>
          `;
        });
      } catch (error) {
        showMessage("Failed to load notes");
        notesDiv.innerHTML = `<div class="empty">Failed to load notes</div>`;
      }
    }

    function editNote(id, title, content) {
      editingId = id;

      titleInput.value = title;
      contentInput.value = content;

      saveBtn.innerText = "Update Note";
      cancelBtn.style.display = "inline-block";

      showMessage("Editing note...");
    }

    function cancelEdit() {
      resetForm();
      showMessage("Edit cancelled");
    }

    async function deleteNote(id) {
      const confirmDelete = confirm("Are you sure you want to delete this note?");

      if (!confirmDelete) {
        return;
      }

      showMessage("Deleting...");

      try {
        const response = await fetch(`/api/notes/${id}`, {
          method: "DELETE"
        });

        const result = await response.json();

        showMessage(result.message);

        fetchNotes();
      } catch (error) {
        showMessage("Delete failed");
      }
    }

    function resetForm() {
      editingId = null;
      titleInput.value = "";
      contentInput.value = "";

      saveBtn.innerText = "Save Note";
      cancelBtn.style.display = "none";
    }

    function showMessage(text) {
      message.innerText = text;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeForTemplate(text) {
      return text
        .replaceAll("\\", "\\\\")
        .replaceAll("`", "\\`")
        .replaceAll("${", "\\${");
    }

    fetchNotes();
  </script>

</body>
</html>
