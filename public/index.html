<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #161616;
      --muted: #666;
      --border: #e5e7eb;
      --accent: #7966fa;
      --accent-soft: #eeeaff;
      --danger: #e84d5b;
      --warn: #ffb020;
      --ok: #1fbf6c;
      --shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    body.dark {
      --bg: #111217;
      --card: #1b1d25;
      --text: #f4f4f5;
      --muted: #aaa;
      --border: #303340;
      --accent-soft: #28234d;
      --shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      transition: 0.25s ease;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .title h1 {
      margin: 0;
      font-size: 32px;
    }

    .title p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .theme-btn {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: var(--card);
      color: var(--text);
    }

    textarea {
      margin-top: 14px;
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    button {
      border: none;
      padding: 11px 16px;
      border-radius: 13px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .save-btn {
      background: var(--accent);
      color: white;
    }

    .cancel-btn {
      background: #777;
      color: white;
      margin-left: 8px;
      display: none;
    }

    .edit-btn {
      background: var(--warn);
      color: white;
      margin-right: 8px;
    }

    .delete-btn {
      background: var(--danger);
      color: white;
    }

    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 120px;
      gap: 12px;
      align-items: center;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 18px 0 12px;
    }

    .section-head h2 {
      margin: 0;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
    }

    .notes {
      display: grid;
      gap: 14px;
    }

    .note {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 18px;
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .note h3 {
      margin: 0 0 8px;
    }

    .note p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .note small {
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    mark {
      background: #fff1a8;
      color: #111;
      padding: 1px 3px;
      border-radius: 4px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 26px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: var(--card);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
      align-items: center;
    }

    .pagination button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 0;
    }

    .page-info {
      color: var(--muted);
      font-size: 14px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 1000;
      min-width: 240px;
    }

    .toast.ok {
      border-left: 5px solid var(--ok);
    }

    .toast.error {
      border-left: 5px solid var(--danger);
    }

    .toast.info {
      border-left: 5px solid var(--accent);
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 760px) {
      .grid,
      .filters {
        grid-template-columns: 1fr;
      }

      .topbar,
      .section-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topbar">
      <div class="title">
        <h1>Notes App</h1>
        <p>Create, search, filter, edit, and manage your notes.</p>
      </div>

      <button class="theme-btn" onclick="toggleTheme()">Toggle Dark Mode</button>
    </div>

    <div class="card">
      <div class="grid">
        <input id="title" placeholder="Enter note title" />
        <input id="quickTag" placeholder="Optional tag/category" />
      </div>

      <textarea id="content" placeholder="Enter note content"></textarea>

      <button id="saveBtn" class="save-btn" onclick="saveNote()">Save Note</button>

      <button id="cancelBtn" class="cancel-btn" onclick="cancelEdit()">
        Cancel Edit
      </button>
    </div>

    <div class="card">
      <div class="filters">
        <input id="searchInput" placeholder="Search title or content..." />

        <input id="startDate" type="date" />

        <input id="endDate" type="date" />

        <select id="limitSelect">
          <option value="5">5 / page</option>
          <option value="10">10 / page</option>
          <option value="20">20 / page</option>
        </select>
      </div>
    </div>

    <div class="section-head">
      <h2>All Notes</h2>
      <div class="count" id="countText">Loading...</div>
    </div>

    <div id="notes" class="notes"></div>

    <div class="pagination">
      <button id="prevBtn" onclick="changePage(-1)">Previous</button>
      <span class="page-info" id="pageInfo">Page 1</span>
      <button id="nextBtn" onclick="changePage(1)">Next</button>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    let editingId = null;
    let currentPage = 1;
    let totalPages = 1;
    let debounceTimer = null;

    const titleInput = document.getElementById("title");
    const contentInput = document.getElementById("content");
    const quickTagInput = document.getElementById("quickTag");
    const notesDiv = document.getElementById("notes");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const searchInput = document.getElementById("searchInput");
    const startDateInput = document.getElementById("startDate");
    const endDateInput = document.getElementById("endDate");
    const limitSelect = document.getElementById("limitSelect");
    const countText = document.getElementById("countText");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const toast = document.getElementById("toast");

    async function saveNote() {
      const title = titleInput.value.trim();
      let content = contentInput.value.trim();

      if (quickTagInput.value.trim()) {
        content = `[${quickTagInput.value.trim()}] ${content}`;
      }

      if (!title || !content) {
        showToast("Please fill title and content", "error");
        return;
      }

      const url = editingId ? `/api/notes/${editingId}` : "/api/notes";
      const method = editingId ? "PUT" : "POST";

      saveBtn.disabled = true;
      saveBtn.innerText = editingId ? "Updating..." : "Saving...";

      try {
        const response = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title, content })
        });

        const result = await response.json();

        if (result.success) {
          showToast(result.message, "ok");
          resetForm();
          fetchNotes();
        } else {
          showToast(result.message || "Action failed", "error");
        }
      } catch (error) {
        showToast("Something went wrong", "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = editingId ? "Update Note" : "Save Note";
      }
    }

    async function fetchNotes() {
      notesDiv.innerHTML = `<div class="spinner"></div>`;
      countText.innerText = "Loading...";

      const search = searchInput.value.trim();
      const startDate = startDateInput.value;
      const endDate = endDateInput.value;
      const limit = limitSelect.value;

      const params = new URLSearchParams({
        page: currentPage,
        limit
      });

      if (search) params.append("search", search);
      if (startDate) params.append("startDate", startDate);
      if (endDate) params.append("endDate", endDate);

      try {
        const response = await fetch(`/api/notes?${params.toString()}`);
        const result = await response.json();

        notesDiv.innerHTML = "";

        totalPages = result.totalPages || 1;

        countText.innerText = `${result.totalNotes || 0} note(s) found`;
        pageInfo.innerText = `Page ${result.currentPage || 1} of ${totalPages}`;

        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        if (!result.data || result.data.length === 0) {
          notesDiv.innerHTML = `<div class="empty">No notes found</div>`;
          return;
        }

        result.data.forEach(note => {
          const safeTitle = escapeHtml(note.title);
          const safeContent = escapeHtml(note.content);

          notesDiv.innerHTML += `
            <div class="note">
              <h3>${highlightText(safeTitle, search)}</h3>
              <p>${highlightText(safeContent, search)}</p>
              <small>Created: ${formatDate(note.createdAt)}</small>

              <button class="edit-btn" onclick="editNote('${note._id}', \`${escapeForTemplate(note.title)}\`, \`${escapeForTemplate(note.content)}\`)">
                Edit
              </button>

              <button class="delete-btn" onclick="deleteNote('${note._id}')">
                Delete
              </button>
            </div>
          `;
        });
      } catch (error) {
        notesDiv.innerHTML = `<div class="empty">Failed to load notes</div>`;
        showToast("Failed to load notes", "error");
      }
    }

    function editNote(id, title, content) {
      editingId = id;

      titleInput.value = title;
      contentInput.value = content;
      quickTagInput.value = "";

      saveBtn.innerText = "Update Note";
      cancelBtn.style.display = "inline-block";

      window.scrollTo({ top: 0, behavior: "smooth" });

      showToast("Editing note", "info");
    }

    function cancelEdit() {
      resetForm();
      showToast("Edit cancelled", "info");
    }

    async function deleteNote(id) {
      const confirmDelete = confirm("Are you sure you want to delete this note?");

      if (!confirmDelete) return;

      showToast("Deleting...", "info");

      try {
        const response = await fetch(`/api/notes/${id}`, {
          method: "DELETE"
        });

        const result = await response.json();

        if (result.success) {
          showToast(result.message, "ok");
          fetchNotes();
        } else {
          showToast(result.message || "Delete failed", "error");
        }
      } catch (error) {
        showToast("Delete failed", "error");
      }
    }

    function changePage(direction) {
      const nextPage = currentPage + direction;

      if (nextPage < 1 || nextPage > totalPages) return;

      currentPage = nextPage;
      fetchNotes();
    }

    function resetForm() {
      editingId = null;
      titleInput.value = "";
      contentInput.value = "";
      quickTagInput.value = "";
      saveBtn.innerText = "Save Note";
      cancelBtn.style.display = "none";
    }

    function showToast(text, type = "info") {
      toast.className = `toast ${type}`;
      toast.innerText = text;
      toast.style.display = "block";

      setTimeout(() => {
        toast.style.display = "none";
      }, 2200);
    }

    function highlightText(text, keyword) {
      if (!keyword) return text;

      const escapedKeyword = escapeRegExp(keyword);
      const regex = new RegExp(`(${escapedKeyword})`, "gi");

      return text.replace(regex, "<mark>$1</mark>");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeForTemplate(text) {
      return String(text)
        .replaceAll("\\", "\\\\")
        .replaceAll("`", "\\`")
        .replaceAll("${", "\\${");
    }

    function escapeRegExp(text) {
      return String(text).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function formatDate(date) {
      if (!date) return "Unknown";
      return new Date(date).toLocaleString();
    }

    function toggleTheme() {
      document.body.classList.toggle("dark");

      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("notes_theme", isDark ? "dark" : "light");
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem("notes_theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);

      debounceTimer = setTimeout(() => {
        currentPage = 1;
        fetchNotes();
      }, 450);
    });

    startDateInput.addEventListener("change", () => {
      currentPage = 1;
      fetchNotes();
    });

    endDateInput.addEventListener("change", () => {
      currentPage = 1;
      fetchNotes();
    });

    limitSelect.addEventListener("change", () => {
      currentPage = 1;
      fetchNotes();
    });

    loadTheme();
    fetchNotes();
  </script>

</body>
</html>
