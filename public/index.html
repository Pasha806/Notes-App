<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6fb;
      color: #222;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
      color: #222;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #6c63ff;
    }

    button {
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 12px;
    }

    .save-btn {
      background: #6c63ff;
      color: white;
    }

    .edit-btn {
      background: #ffb020;
      color: white;
      margin-right: 8px;
    }

    .delete-btn {
      background: #e84d5b;
      color: white;
    }

    #message {
      font-weight: bold;
      margin-top: 14px;
      color: #6c63ff;
    }

    .note {
      background: white;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .note h3 {
      margin: 0 0 8px;
    }

    .note p {
      margin: 0 0 12px;
      color: #555;
    }

    .empty {
      color: #777;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>Notes App</h1>

      <input id="title" placeholder="Enter note title" />

      <textarea id="content" placeholder="Enter note content"></textarea>

      <button class="save-btn" onclick="addNote()">Save Note</button>

      <p id="message"></p>
    </div>

    <h2>All Notes</h2>
    <div id="notes"></div>

  </div>

  <script>
    let editingId = null;

    async function addNote() {
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();

      if (!title || !content) {
        showMessage("Please fill all fields");
        return;
      }

      const url = editingId ? `/api/notes/${editingId}` : "/api/notes";
      const method = editingId ? "PUT" : "POST";

      try {
        const response = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title, content })
        });

        const result = await response.json();

        showMessage(result.message);

        document.getElementById("title").value = "";
        document.getElementById("content").value = "";

        editingId = null;

        fetchNotes();
      } catch (error) {
        showMessage("Something went wrong");
      }
    }

    async function fetchNotes() {
      try {
        const response = await fetch("/api/notes");
        const result = await response.json();

        const notesDiv = document.getElementById("notes");
        notesDiv.innerHTML = "";

        if (!result.data || result.data.length === 0) {
          notesDiv.innerHTML = `<div class="empty">No notes found</div>`;
          return;
        }

        result.data.forEach(note => {
          notesDiv.innerHTML += `
            <div class="note">
              <h3>${note.title}</h3>
              <p>${note.content}</p>

              <button class="edit-btn" onclick="editNote('${note._id}', \`${note.title}\`, \`${note.content}\`)">
                Edit
              </button>

              <button class="delete-btn" onclick="deleteNote('${note._id}')">
                Delete
              </button>
            </div>
          `;
        });
      } catch (error) {
        showMessage("Failed to load notes");
      }
    }

    function editNote(id, title, content) {
      editingId = id;

      document.getElementById("title").value = title;
      document.getElementById("content").value = content;

      showMessage("Editing note...");
    }

    async function deleteNote(id) {
      try {
        const response = await fetch(`/api/notes/${id}`, {
          method: "DELETE"
        });

        const result = await response.json();

        showMessage(result.message);

        fetchNotes();
      } catch (error) {
        showMessage("Delete failed");
      }
    }

    function showMessage(text) {
      document.getElementById("message").innerText = text;
    }

    fetchNotes();
  </script>

</body>
</html>
